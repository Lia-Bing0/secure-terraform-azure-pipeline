name: terraform-ci

on:
  push:
    branches:
      - main
      - feature/python-security-gate
      - feature/trivy-security-gate
  pull_request:

jobs:
  terraform:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login (OIDC)
        if: false
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive
      
      # Temporarily skip cloud-dependent steps to avoid failures without active Azure subscription
      - name: Terraform init
        if: false
        run: terraform init -backend-config="use_azuread_auth=true"

      - name: Terraform validate
        if: false
        run: terraform validate

      - name: Terraform plan
        if: false
        run: terraform plan -no-color

      - name: Install Checkov
        run: pip install checkov
        working-directory: .

      - name: Run Checkov JSON scan
        run: checkov -d infra --output json > reports/checkov-report.json || true
        working-directory: .

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
        working-directory: .

      - name: Run Trivy IaC scan
        run: trivy config infra --format json --output reports/trivy-report.json || true
        working-directory: .


      - name: Run Python security gate
        run: python scripts/security_gate.py
        working-directory: .

      - name: Upload security summary artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-summary
          path: reports/security-summary.md

      - name: Upload Checkov JSON artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-report
          path: reports/checkov-report.json

      - name: Upload Trivy JSON artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: reports/trivy-report.json