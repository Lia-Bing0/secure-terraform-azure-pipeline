name: terraform-ci

on:
  push:
     branches:
      - main
      - feature/python-security-gate
  pull_request:

jobs:
  terraform:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login (OIDC)
        if: false
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive
      
      # Temporarily skip cloud-dependent steps to avoid failures without active Azure subscription
      - name: Terraform init
        if: false
        run: terraform init -backend-config="use_azuread_auth=true"

      - name: Terraform validate
        if: false
        run: terraform validate

      - name: Terraform plan
        if: false
        run: terraform plan -no-color

      - name: Install Checkov
        run: pip install checkov
        working-directory: .

      - name: Run Checkov JSON scan
        run: checkov -d infra --output json > reports/checkov-report.json
        working-directory: .

      - name: Run Python security gate
        run: python scripts/security_gate.py
        working-directory: .